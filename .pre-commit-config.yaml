#
# Pre-commit hooks configuration.
#
# See https://pre-commit.com for more information.
#
# Install the framework:
#   pipx install pre-commit
#
# Install the git hook scripts:
#   pre-commit install
#
# Run against all files (useful after adding new hooks):
#   pre-commit run --all-files
#

default_install_hook_types: [pre-commit, commit-msg]

repos:
  # Defined locally, rather than consumed from the shared
  # kieranpotts/pre-commit-hooks repository, so the set of allowed commit
  # types can include prefixes specific to this repository — `feature`,
  # `quality`, and `epic`, used to scaffold a new proposal on its branch. Keep
  # the allowed types in sync with .github/workflows/validate-commit-messages.yaml.
  - repo: local
    hooks:
      - id: validate-commit-message
        name: Validate commit message format
        entry: .hooks/validate_commit_message.py
        language: script
        stages: [commit-msg]
