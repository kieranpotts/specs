#
# Validate commit message formats.
#
# A repository-specific variant of the shared
# `kieranpotts/actions/validate-commit-messages` action,
# inlined here so the set of allowed commit types can be
# tailored to this repository: a subset of the standard
# revision types, plus custom prefixes — `epic`, `feature`,
# and `quality`.
#

name: Validate Commit Messages

on:
  push:
    branches:
      - "*"

jobs:
  validate-commit-messages:
    name: Validate commit messages on all branches
    runs-on: ubuntu-latest

    steps:

      # Checkout the repository and fetch its full log history.
      # https://github.com/actions/checkout?tab=readme-ov-file#fetch-all-history-for-all-tags-and-branches
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get log of new commit messages
        id: log
        run: |
          git_log_output=$(git log --format=%s "${BASE_SHA:-$BEFORE_SHA}...${HEAD_SHA:-$GITHUB_REF}")

          echo "::notice::New commit messages: $git_log_output"

          {
            echo "git_log_output<<EOF"
            echo "$git_log_output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: "${{ github.event.before }}"
        shell: bash

      - name: Validate new commit messages
        run: |
          # Allowed commit types:
          #   Standard (subset of TS-9) : chore, fix, format, maintenance, refactor, revert
          #   Custom (this repository)  : epic, feature, quality
          types="chore|fix|format|maintenance|refactor|revert|epic|feature|quality"
          re="^($types): [a-z0-9].*$"

          echo "$GIT_LOG_OUTPUT" | while read -r line; do
            [ -z "$line" ] && continue
            echo "Validating commit message: '$line'"
            if [[ ! $line =~ $re ]]; then
              echo "::error::Invalid commit message: '$line'"
              echo "Expected '<type>: <description>', where <type> is one of: ${types//|/, }"
              exit 1
            fi
          done
        env:
          GIT_LOG_OUTPUT: "${{ steps.log.outputs.git_log_output }}"
        shell: bash
